<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1d6fa5">
    <title>養魚小遊戲</title>
    <link rel="icon" href="image/fish_image.png" type="image/png">
    <link rel="preload" as="image" href="image/bg.webp">
    <link rel="preload" as="image" href="image/fish_image.png">
    <style>
        :root {
            --panel-bg: rgba(255, 255, 255, 0.78);
            --panel-border: rgba(255, 255, 255, 0.5);
            --accent: #1d6fa5;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC",
                         "Microsoft JhengHei", Roboto, sans-serif;
            color: #143b55;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }
        body {
            background: url('image/bg.webp') repeat;
            user-select: none;
        }
        .fish {
            position: absolute;
            top: 0;
            left: 0;
            width: 50px;
            height: auto;
            transform: translate3d(0, 0, 0);
            transition: width 0.4s ease-out;
            will-change: transform;
            pointer-events: none;
            /* soft cast shadow on the "water surface" below + a hint of depth */
            filter:
                drop-shadow(0 6px 5px rgba(8, 30, 50, 0.25))
                drop-shadow(0 1px 1px rgba(0, 0, 0, 0.2));
        }
        .food {
            position: absolute;
            width: 14px;
            height: 14px;
            margin: -7px 0 0 -7px;
            background: radial-gradient(circle at 35% 35%, #ff6b6b 0%, #c0392b 70%, #7a1d12 100%);
            border-radius: 50%;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
            pointer-events: none;
            animation: foodDrop 0.25s ease-out;
        }
        @keyframes foodDrop {
            from { transform: scale(0.2); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }
        #ripple-container {
            position: fixed;
            inset: 0;
            z-index: 0;
        }
        #controls {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 10;
            display: flex;
            gap: 10px;
            align-items: center;
            padding: 10px 14px;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
            font-size: 14px;
        }
        #controls label { font-weight: 600; }
        #controls input[type="range"] { width: 140px; accent-color: var(--accent); }
        #fishCountValue {
            display: inline-block;
            min-width: 2.5ch;
            text-align: right;
            font-variant-numeric: tabular-nums;
            font-weight: 600;
            color: var(--accent);
        }
        #controls button {
            padding: 4px 10px;
            border: 1px solid var(--accent);
            background: white;
            color: var(--accent);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.15s, color 0.15s;
        }
        #controls button:hover { background: var(--accent); color: white; }
        #hint {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            padding: 6px 14px;
            background: var(--panel-bg);
            border-radius: 999px;
            font-size: 13px;
            opacity: 0;
            animation: fadeHint 4s ease forwards;
            pointer-events: none;
        }
        @keyframes fadeHint {
            0%   { opacity: 0; }
            15%  { opacity: 1; }
            85%  { opacity: 1; }
            100% { opacity: 0; }
        }
        @media (max-width: 480px) {
            #controls { font-size: 13px; padding: 8px 10px; gap: 8px; }
            #controls input[type="range"] { width: 100px; }
        }
        @media (prefers-reduced-motion: reduce) {
            .fish { transition: none; }
            .food { animation: none; }
        }
    </style>
</head>
<body>
    <div id="controls">
        <label for="fishCount">魚的數量</label>
        <input type="range" id="fishCount" value="1" min="1" max="100" step="1">
        <span id="fishCountValue">1</span>
        <button id="clearFood" type="button" title="清除所有飼料">清除飼料</button>
    </div>
    <div id="ripple-container"></div>
    <div id="hint">點擊任意處撒飼料 🐟</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.ripples/0.5.3/jquery.ripples.min.js"></script>
    <script>
    (function () {
        'use strict';

        const $ripple = $('#ripple-container');
        const controls = document.getElementById('controls');
        const fishCountInput = document.getElementById('fishCount');
        const fishCountValue = document.getElementById('fishCountValue');
        const clearFoodBtn = document.getElementById('clearFood');

        const INITIAL_FISH_SIZE = 50;
        const FISH_GROWTH_STEP = 15;
        const MAX_FISH_SIZE = 200;
        const CRUISE_SPEED = 32;        // px/s when wandering
        const CHASE_SPEED = 95;         // px/s when chasing food
        const SPEED_LERP = 1.8;         // how fast speed adapts (1/s)
        const MAX_TURN_RATE = 2.6;      // rad/s — limits sharpness of turns
        const WALL_MARGIN = 70;         // px — start veering away from edges
        const WANDER_FREQ = 0.35;       // Hz — slow heading drift
        const TAIL_BEAT_BASE = 1.8;     // Hz at rest
        const TAIL_BEAT_PER_SPEED = 0.045;
        const TAIL_BEAT_AMP = 0.22;     // radians (~12.5°)
        const RIPPLE_INTERVAL = 0.18;   // seconds between fish wake puffs

        let viewportW = window.innerWidth;
        let viewportH = window.innerHeight;

        const fishList = [];
        const foodList = [];

        let rippleEnabled = false;
        try {
            $ripple.ripples({ resolution: 512, dropRadius: 18, perturbance: 0.025 });
            rippleEnabled = true;
        } catch (e) {
            // WebGL not supported – fall back gracefully without ripples
            console.warn('Ripples unavailable:', e && e.message);
        }

        function wrapAngle(a) {
            // wrap into (-PI, PI]
            a = (a + Math.PI) % (Math.PI * 2);
            if (a < 0) a += Math.PI * 2;
            return a - Math.PI;
        }

        function createFish() {
            const el = document.createElement('img');
            el.src = 'image/fish_image.png';
            el.className = 'fish';
            el.draggable = false;
            el.alt = '';
            const size = INITIAL_FISH_SIZE;
            el.style.width = size + 'px';
            document.body.appendChild(el);

            return {
                el,
                size,
                x: Math.random() * Math.max(1, viewportW - size),
                y: Math.random() * Math.max(1, viewportH - size),
                heading: Math.random() * Math.PI * 2,
                speed: CRUISE_SPEED,
                wanderPhase: Math.random() * Math.PI * 2,
                wanderTarget: (Math.random() - 0.5) * 1.2, // bias for current wander arc
                beatPhase: Math.random() * Math.PI * 2,
                rippleAccum: Math.random() * RIPPLE_INTERVAL
            };
        }

        function clearFish() {
            for (const f of fishList) f.el.remove();
            fishList.length = 0;
        }

        function setFishCount(n) {
            n = Math.max(1, Math.min(100, parseInt(n, 10) || 1));
            fishCountValue.textContent = n;
            if (n === fishList.length) return;
            if (n < fishList.length) {
                while (fishList.length > n) fishList.pop().el.remove();
            } else {
                while (fishList.length < n) fishList.push(createFish());
            }
        }

        function addFood(x, y) {
            const el = document.createElement('div');
            el.className = 'food';
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            foodList.push({ el, x, y });
        }

        function clearAllFood() {
            for (const f of foodList) f.el.remove();
            foodList.length = 0;
        }

        function removeFood(idx) {
            foodList[idx].el.remove();
            foodList.splice(idx, 1);
        }

        function updateFish(fish, dt) {
            const fcx = fish.x + fish.size / 2;
            const fcy = fish.y + fish.size / 2;

            // --- 1. Find nearest food ---
            let nearest = null;
            let nearestD2 = Infinity;
            for (let i = 0; i < foodList.length; i++) {
                const fd = foodList[i];
                const ddx = fd.x - fcx;
                const ddy = fd.y - fcy;
                const d2 = ddx * ddx + ddy * ddy;
                if (d2 < nearestD2) { nearestD2 = d2; nearest = fd; }
            }

            // --- 2. Decide desired heading & target speed ---
            let desired = fish.heading;
            let targetSpeed = CRUISE_SPEED;

            if (nearest) {
                desired = Math.atan2(nearest.y - fcy, nearest.x - fcx);
                // Burst-faster the closer it gets; tops out at CHASE_SPEED
                const d = Math.sqrt(nearestD2);
                const eagerness = Math.min(1, 400 / (d + 60));
                targetSpeed = CRUISE_SPEED + (CHASE_SPEED - CRUISE_SPEED) * eagerness;
            } else {
                // Lazy wandering: drift the desired heading along a slow sinusoid
                fish.wanderPhase += dt * WANDER_FREQ * Math.PI * 2;
                if (Math.random() < dt * 0.4) {
                    // occasionally pick a new wander bias
                    fish.wanderTarget = (Math.random() - 0.5) * 1.6;
                }
                desired = fish.heading
                        + Math.sin(fish.wanderPhase) * 0.35
                        + fish.wanderTarget * dt;
            }

            // --- 3. Soft wall avoidance: blend in an "away from edge" heading ---
            const distL = fcx;
            const distR = viewportW - fcx;
            const distT = fcy;
            const distB = viewportH - fcy;
            const minDist = Math.min(distL, distR, distT, distB);
            if (minDist < WALL_MARGIN) {
                const ax = (1 / Math.max(distL, 1)) - (1 / Math.max(distR, 1));
                const ay = (1 / Math.max(distT, 1)) - (1 / Math.max(distB, 1));
                const awayHeading = Math.atan2(-ay, -ax);
                const weight = 1 - minDist / WALL_MARGIN; // 0..1, stronger near wall
                // Blend desired toward awayHeading by 'weight'
                desired = fish.heading
                        + wrapAngle(desired - fish.heading) * (1 - weight)
                        + wrapAngle(awayHeading - fish.heading) * weight;
                // Slow down a bit when steering away from a wall
                targetSpeed *= (1 - weight * 0.4);
            }

            // --- 4. Smooth heading & speed ---
            const dh = wrapAngle(desired - fish.heading);
            const maxTurn = MAX_TURN_RATE * dt;
            fish.heading += dh > maxTurn ? maxTurn : (dh < -maxTurn ? -maxTurn : dh);
            fish.speed += (targetSpeed - fish.speed) * Math.min(1, dt * SPEED_LERP);

            // --- 5. Tail beat: faster when swimming faster, amplitude eases with speed ---
            const beatHz = TAIL_BEAT_BASE + fish.speed * TAIL_BEAT_PER_SPEED;
            fish.beatPhase += dt * beatHz * Math.PI * 2;
            const beat = Math.sin(fish.beatPhase);
            const beatAmp = TAIL_BEAT_AMP * (0.35 + Math.min(1, fish.speed / CHASE_SPEED) * 0.65);

            // --- 6. Advance position ---
            fish.x += Math.cos(fish.heading) * fish.speed * dt;
            fish.y += Math.sin(fish.heading) * fish.speed * dt;

            // Hard clamp (should rarely trigger thanks to soft avoidance)
            const maxX = Math.max(0, viewportW - fish.size);
            const maxY = Math.max(0, viewportH - fish.size);
            if (fish.x < 0) fish.x = 0;
            else if (fish.x > maxX) fish.x = maxX;
            if (fish.y < 0) fish.y = 0;
            else if (fish.y > maxY) fish.y = maxY;

            // --- 7. Visual transform: heading + tail sway. Image faces up, so +90°. ---
            const visualRad = fish.heading + beat * beatAmp;
            const angleDeg = visualRad * 180 / Math.PI + 90;
            fish.el.style.transform =
                'translate3d(' + fish.x + 'px,' + fish.y + 'px,0) rotate(' + angleDeg + 'deg)';

            // --- 8. Wake: a pair of small ripples behind the tail forming a V ---
            fish.rippleAccum += dt;
            if (rippleEnabled && fish.rippleAccum >= RIPPLE_INTERVAL) {
                fish.rippleAccum -= RIPPLE_INTERVAL;
                const speedNorm = Math.min(1, fish.speed / CHASE_SPEED);
                // Only produce a meaningful wake when actually swimming
                if (speedNorm > 0.15) {
                    const cosH = Math.cos(fish.heading);
                    const sinH = Math.sin(fish.heading);
                    const tailDist = fish.size * 0.42;
                    const sideDist = fish.size * (0.10 + speedNorm * 0.08);
                    const cx2 = fcx - cosH * tailDist;
                    const cy2 = fcy - sinH * tailDist;
                    // perpendicular (-sinH, cosH)
                    const px = -sinH * sideDist;
                    const py =  cosH * sideDist;
                    const strength = 0.012 + speedNorm * 0.025;
                    const radius = 9 + speedNorm * 6;
                    $ripple.ripples('drop', cx2 + px, cy2 + py, radius, strength);
                    $ripple.ripples('drop', cx2 - px, cy2 - py, radius, strength);
                }
            }

            // --- 9. Eat food (circle distance) ---
            const eatR = fish.size * 0.45;
            const eatR2 = eatR * eatR;
            for (let i = foodList.length - 1; i >= 0; i--) {
                const fd = foodList[i];
                const ddx = fd.x - fcx;
                const ddy = fd.y - fcy;
                if (ddx * ddx + ddy * ddy <= eatR2) {
                    removeFood(i);
                    if (fish.size < MAX_FISH_SIZE) {
                        fish.size = Math.min(MAX_FISH_SIZE, fish.size + FISH_GROWTH_STEP);
                        fish.el.style.width = fish.size + 'px';
                    }
                    if (rippleEnabled) $ripple.ripples('drop', fd.x, fd.y, 14, 0.05);
                }
            }
        }

        let lastTime = performance.now();
        function tick(now) {
            const dt = Math.min(0.1, (now - lastTime) / 1000); // clamp big gaps (tab switch)
            lastTime = now;
            for (let i = 0; i < fishList.length; i++) updateFish(fishList[i], dt);
            requestAnimationFrame(tick);
        }

        // --- Input handling ---
        function isInUI(target) {
            return controls.contains(target);
        }

        function dropFoodFromEvent(ev) {
            if (isInUI(ev.target)) return;
            const pts = ev.changedTouches || [ev];
            for (let i = 0; i < pts.length; i++) {
                const p = pts[i];
                const x = p.clientX, y = p.clientY;
                if (x == null || y == null) continue;
                addFood(x, y);
                if (rippleEnabled) {
                    // small impact + secondary expanding splash for a "plop" feel
                    $ripple.ripples('drop', x, y, 14, 0.06);
                    setTimeout(() => {
                        if (rippleEnabled) $ripple.ripples('drop', x, y, 24, 0.025);
                    }, 90);
                }
            }
        }

        document.addEventListener('click', dropFoodFromEvent);
        document.addEventListener('touchstart', (ev) => {
            if (isInUI(ev.target)) return;
            ev.preventDefault();
            dropFoodFromEvent(ev);
        }, { passive: false });

        if (rippleEnabled) {
            // Smear ripples along mouse motion: more drops the faster you move,
            // each one small — gives a continuous trail instead of one big splash.
            let lastMove = 0, lastMX = null, lastMY = null;
            $ripple.on('mousemove', function (event) {
                const t = event.timeStamp || performance.now();
                if (t - lastMove < 16) return; // ~60fps cap
                const x = event.clientX, y = event.clientY;
                if (lastMX != null) {
                    const dist = Math.hypot(x - lastMX, y - lastMY);
                    const steps = Math.min(4, Math.max(1, Math.floor(dist / 14)));
                    for (let i = 1; i <= steps; i++) {
                        const f = i / steps;
                        $ripple.ripples(
                            'drop',
                            lastMX + (x - lastMX) * f,
                            lastMY + (y - lastMY) * f,
                            10, 0.012
                        );
                    }
                } else {
                    $ripple.ripples('drop', x, y, 10, 0.012);
                }
                lastMove = t; lastMX = x; lastMY = y;
            });
        }

        fishCountInput.addEventListener('input', (e) => setFishCount(e.target.value));
        clearFoodBtn.addEventListener('click', clearAllFood);

        // Keep pause on tab hidden to avoid runaway ripple drops
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) lastTime = performance.now();
        });

        let resizeRaf = 0;
        window.addEventListener('resize', () => {
            if (resizeRaf) return;
            resizeRaf = requestAnimationFrame(() => {
                resizeRaf = 0;
                viewportW = window.innerWidth;
                viewportH = window.innerHeight;
                // Re-clamp fish positions inside new viewport
                for (const f of fishList) {
                    f.x = Math.min(f.x, Math.max(0, viewportW - f.size));
                    f.y = Math.min(f.y, Math.max(0, viewportH - f.size));
                }
            });
        });

        // Init
        setFishCount(fishCountInput.value);
        requestAnimationFrame((t) => { lastTime = t; tick(t); });
    })();
    </script>
</body>
</html>
